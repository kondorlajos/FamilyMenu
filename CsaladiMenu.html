<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Családi Menü</title>
<style>
  :root {
    --bg: #FAF8F3;
    --surface: #FFFFFF;
    --surface2: #F2EFE8;
    --border: #E2DDD5;
    --border2: #C8C2B8;
    --text: #1A1815;
    --text2: #6B6560;
    --text3: #9E9890;
    --accent: #C17B2E;
    --accent-bg: #FDF3E3;
    --accent-dark: #9A5E1A;
    --green: #3B6D11;
    --green-bg: #EAF3DE;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --blue: #185FA5;
    --blue-bg: #E6F1FB;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1815;
      --surface: #252220;
      --surface2: #2E2B27;
      --border: #3A3630;
      --border2: #4E4840;
      --text: #F0EDE7;
      --text2: #A09890;
      --text3: #6B6560;
      --accent: #E8A04A;
      --accent-bg: #2C200E;
      --accent-dark: #F5C070;
      --green: #97C459;
      --green-bg: #1A2E0A;
      --red: #F09595;
      --red-bg: #2C0D0D;
      --blue: #85B7EB;
      --blue-bg: #0A1C30;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif; font-size: 15px; }

  /* ---- LAYOUT ---- */
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 680px; margin: 0 auto; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px 10px;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; flex: 1; }
  header .subtitle { font-size: 11px; color: var(--text3); font-weight: 400; }

  #config-btn {
    background: none; border: none; padding: 6px; cursor: pointer;
    color: var(--text2); font-size: 18px; border-radius: 6px;
    transition: background 0.15s;
  }
  #config-btn:hover { background: var(--surface2); }

  /* ---- TABS ---- */
  #tabs {
    display: flex; background: var(--surface); border-bottom: 0.5px solid var(--border);
  }
  .tab-btn {
    flex: 1; padding: 11px 8px; border: none; background: none; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--text2);
    border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn .tab-count {
    display: inline-block; background: var(--accent); color: white;
    font-size: 10px; padding: 1px 5px; border-radius: 8px; margin-left: 4px;
  }

  /* ---- MAIN CONTENT ---- */
  #content { flex: 1; overflow-y: auto; padding: 0; }
  .view { display: none; padding: 16px; }
  .view.active { display: block; }

  /* ---- API CONFIG PANEL ---- */
  #config-panel {
    display: none; padding: 16px;
    background: var(--accent-bg); border-bottom: 0.5px solid var(--border);
  }
  #config-panel.open { display: block; }
  #config-panel label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  #config-panel input {
    width: 100%; padding: 9px 11px; border: 0.5px solid var(--border2);
    border-radius: var(--radius); background: var(--surface); color: var(--text);
    font-size: 13px; margin-bottom: 8px;
  }
  .config-row { display: flex; gap: 8px; }
  .btn-sm {
    padding: 8px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer;
    transition: background 0.15s; white-space: nowrap;
  }
  .btn-sm:hover { background: var(--surface2); }
  .btn-sm.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-sm.primary:hover { background: var(--accent-dark); }
  .status-msg { font-size: 12px; padding: 6px 0; }
  .status-msg.ok { color: var(--green); }
  .status-msg.err { color: var(--red); }

  /* ---- WEEK NAV ---- */
  .week-nav {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px;
  }
  .week-nav button {
    width: 34px; height: 34px; border: 0.5px solid var(--border2);
    border-radius: 8px; background: var(--surface); color: var(--text);
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .week-nav button:hover { background: var(--surface2); }
  .week-nav .week-label { flex: 1; text-align: center; font-size: 14px; font-weight: 600; }

  /* ---- DAY CARDS ---- */
  .day-card {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 0.5px solid var(--border); margin-bottom: 10px; overflow: hidden;
  }
  .day-header {
    display: flex; align-items: center; padding: 10px 14px;
    background: var(--surface2); border-bottom: 0.5px solid var(--border);
    cursor: pointer;
  }
  .day-header .day-name { font-weight: 600; font-size: 14px; flex: 1; }
  .day-header .day-today { background: var(--accent); color: white; font-size: 10px; padding: 2px 7px; border-radius: 6px; margin-left: 6px; }
  .day-meals { padding: 4px 0 6px; }
  .meal-type-header {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px 2px;
  }
  .meal-type-header .meal-icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
  .meal-type-header .meal-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; }
  .meal-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 14px 4px 34px; cursor: pointer; transition: background 0.12s;
  }
  .meal-row:hover { background: var(--surface2); }
  .meal-row-dish .meal-dish { flex: 1; font-size: 14px; font-weight: 500; }
  .meal-row-add .meal-empty { color: var(--text3); font-size: 13px; }
  .meal-dish-bullet { color: var(--text3); font-size: 16px; flex-shrink: 0; }
  .meal-add-icon { color: var(--accent); font-size: 16px; font-weight: 600; flex-shrink: 0; width: 16px; text-align: center; }

  /* drag handle */
  .drag-handle {
    color: var(--text3); font-size: 15px; flex-shrink: 0;
    cursor: grab; padding: 0 2px; touch-action: none; user-select: none;
  }
  .drag-handle:active { cursor: grabbing; }
  .meal-row-dish { touch-action: none; }
  .meal-row-dish.dragging { opacity: 0.4; background: var(--surface2); }
  .drop-zone {
    height: 3px; margin: 1px 14px 1px 34px; border-radius: 2px;
    background: transparent; transition: background 0.15s, height 0.15s;
  }
  .drop-zone.drag-over { height: 28px; background: var(--accent-bg); border: 1.5px dashed var(--accent); border-radius: 6px; }
  .meal-slot-drop-target { outline: none; }
  .meal-slot-drop-target.drag-over-slot { background: var(--accent-bg); border-radius: 6px; }
  .meal-recipe-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 5px;
    background: var(--green-bg); color: var(--green); font-weight: 500;
  }
  .meal-edit-icon { color: var(--text3); font-size: 14px; }

  /* ---- MODAL ---- */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 18px 18px 0 0;
    width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom);
  }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 10px auto 16px; }
  .modal-title { font-size: 16px; font-weight: 600; padding: 0 16px 12px; }
  .modal-context { font-size: 12px; color: var(--text2); padding: 0 16px; margin-bottom: 14px; }
  .modal-section { padding: 0 16px 16px; }
  .modal-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; }
  .modal-input {
    width: 100%; padding: 10px 12px; border: 0.5px solid var(--border2);
    border-radius: var(--radius); background: var(--surface); color: var(--text);
    font-size: 15px;
  }
  .modal-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .modal-divider { height: 0.5px; background: var(--border); margin: 4px 16px 14px; }

  /* Recipe chips */
  .recipe-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 6px; }
  .recipe-chip {
    padding: 6px 12px; border: 0.5px solid var(--border2); border-radius: 18px;
    font-size: 13px; cursor: pointer; background: var(--surface2); color: var(--text);
    transition: all 0.12s; white-space: nowrap;
  }
  .recipe-chip.selected { background: var(--accent); color: white; border-color: var(--accent); }
  .recipe-chip:hover:not(.selected) { border-color: var(--accent); color: var(--accent); }

  /* Ingredient rows */
  .ingredient-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .ingredient-row { display: flex; gap: 7px; align-items: center; }
  .ingredient-row input { padding: 9px 10px; border: 0.5px solid var(--border2); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 14px; }
  .ingredient-row .ing-name { flex: 2.5; }
  .ingredient-row .ing-amount { flex: 1; }
  .ingredient-row .ing-unit { flex: 1; }
  .ingredient-row .del-btn { width: 30px; height: 30px; border: none; background: none; color: var(--text3); font-size: 18px; cursor: pointer; flex-shrink: 0; }
  .ingredient-row .del-btn:hover { color: var(--red); }

  /* Action buttons */
  .modal-actions { padding: 8px 16px 20px; display: flex; flex-direction: column; gap: 8px; }
  .btn-full {
    width: 100%; padding: 13px; border-radius: var(--radius); font-size: 15px;
    font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-full.primary { background: var(--accent); color: white; }
  .btn-full.primary:hover { background: var(--accent-dark); }
  .btn-full.secondary { background: var(--surface2); color: var(--text); border: 0.5px solid var(--border); }
  .btn-full.danger { background: var(--red-bg); color: var(--red); }
  .btn-full.nosalty { background: var(--blue-bg); color: var(--blue); border: 0.5px solid var(--border); }
  .btn-sm.nosalty { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
  .meal-pick-btn {
    flex:1; padding:9px 4px; border:0.5px solid var(--border2); border-radius:var(--radius);
    background:var(--surface2); color:var(--text); font-size:13px; cursor:pointer; transition:all 0.15s;
  }
  .meal-pick-btn.selected { background:var(--accent); color:white; border-color:var(--accent); }

  /* ---- SHOPPING VIEW ---- */
  .shopping-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .shopping-header h2 { font-size: 16px; font-weight: 600; }
  .shopping-actions { display: flex; gap: 7px; }

  .shop-section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
  .shop-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; background: var(--surface); border-radius: 10px;
    margin-bottom: 7px; border: 0.5px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .shop-item.checked { opacity: 0.5; }
  .shop-item.checked .shop-name { text-decoration: line-through; color: var(--text3); }
  .shop-checkbox {
    width: 22px; height: 22px; border: 1.5px solid var(--border2);
    border-radius: 6px; flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; transition: all 0.15s;
  }
  .shop-item.checked .shop-checkbox { background: var(--green); border-color: var(--green); color: white; }
  .shop-name { flex: 1; font-size: 15px; }
  .shop-amount { font-size: 13px; color: var(--text2); white-space: nowrap; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ---- RECIPES VIEW ---- */
  .recipes-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .recipes-header h2 { font-size: 16px; font-weight: 600; }
  .recipe-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 13px 14px;
    margin-bottom: 9px; cursor: pointer; transition: all 0.15s;
  }
  .recipe-card:hover { border-color: var(--accent); }
  .recipe-card-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .recipe-card-meta { font-size: 12px; color: var(--text2); }
  .recipe-card-ings { font-size: 12px; color: var(--text3); margin-top: 5px; }

  /* Loading spinner */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); left: 50%;
    transform: translateX(-50%); background: var(--text); color: var(--bg);
    padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 500;
    z-index: 200; pointer-events: none; opacity: 0; transition: opacity 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div>
      <h1>Családi Menü</h1>
      <div class="subtitle" id="header-status">Nincs API beállítva</div>
    </div>
    <button id="config-btn" onclick="toggleConfig()" title="Beállítások">⚙️</button>
  </header>

  <!-- API CONFIG PANEL -->
  <div id="config-panel">
    <label>Google Apps Script Webhook URL</label>
    <input type="url" id="api-url-input" placeholder="https://script.google.com/macros/s/.../exec">
    <label>Személyek száma (alapértelmezett)</label>
    <input type="number" id="default-servings" value="4" min="1" max="20">
    <div class="config-row">
      <button class="btn-sm primary" onclick="saveConfig()">Mentés</button>
      <button class="btn-sm" onclick="testConnection()">Kapcsolat tesztelése</button>
    </div>
    <div id="config-status" class="status-msg"></div>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <button class="tab-btn active" onclick="switchTab('menu')">📅 Menü</button>
    <button class="tab-btn" onclick="switchTab('shopping')">🛒 Bevásárlás <span class="tab-count" id="shopping-count" style="display:none">0</span></button>
    <button class="tab-btn" onclick="switchTab('recipes')">📖 Receptek</button>
  </div>

  <div id="content">
    <!-- MENU VIEW -->
    <div class="view active" id="view-menu">
      <div class="week-nav">
        <button onclick="changeWeek(-1)">‹</button>
        <div class="week-label" id="week-label"></div>
        <button onclick="changeWeek(1)">›</button>
      </div>
      <div id="days-container"></div>
    </div>

    <!-- SHOPPING VIEW -->
    <div class="view" id="view-shopping">
      <div class="shopping-header">
        <h2>Bevásárlólista</h2>
        <div class="shopping-actions">
          <button class="btn-sm" onclick="clearChecked()">Kész törlése</button>
          <button class="btn-sm danger" onclick="clearAll()">Mind törlése</button>
        </div>
      </div>
      <div id="shopping-container"></div>
    </div>

    <!-- RECIPES VIEW -->
    <div class="view" id="view-recipes">
      <div class="recipes-header">
        <h2>Receptek</h2>
        <button class="btn-sm primary" onclick="openNewRecipe()">+ Új recept</button>
      </div>
      <div id="recipes-container"></div>
    </div>
  </div>
</div>

<!-- MEAL EDIT MODAL -->
<div class="modal-overlay" id="meal-modal" onclick="closeMealModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="meal-modal-title">Étel beállítása</div>
    <div class="modal-context" id="meal-modal-context"></div>

    <div class="modal-section">
      <label class="modal-label">Étel neve</label>
      <input class="modal-input" type="text" id="meal-dish-input" placeholder="pl. Paprikás krumpli">
    </div>

    <div class="modal-divider"></div>

    <div class="modal-section">
      <label class="modal-label">Meglévő receptből</label>
      <div class="recipe-chips" id="recipe-chips"></div>
    </div>

    <div class="modal-divider"></div>

    <div class="modal-section">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <label class="modal-label" style="margin:0">Hozzávalók <span style="color:var(--text3);font-size:11px">(személyek: <span id="servings-display">4</span>)</span></label>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="btn-sm" onclick="changeServings(-1)" style="width:28px;height:28px;padding:0;font-size:16px;border-radius:6px;">−</button>
          <span id="servings-val" style="font-size:14px;font-weight:600;min-width:20px;text-align:center;">4</span>
          <button class="btn-sm" onclick="changeServings(1)" style="width:28px;height:28px;padding:0;font-size:16px;border-radius:6px;">+</button>
        </div>
      </div>
      <div class="ingredient-list" id="ingredient-list"></div>
      <button class="btn-sm" onclick="addIngredientRow()" style="margin-top:8px; width:100%">+ Hozzávaló hozzáadása</button>
    </div>

    <div class="modal-actions">
      <button class="btn-full nosalty" onclick="openNosalty()">🔍 Keresés Mindmegette-n</button>
      <label style="display:flex;align-items:center;gap:10px;padding:4px 0 8px;cursor:pointer;">
        <input type="checkbox" id="add-to-shopping-check" style="width:20px;height:20px;accent-color:var(--accent);cursor:pointer;">
        <span style="font-size:14px;color:var(--text2);">Hozzáadás a bevásárlólistához is</span>
      </label>
      <button class="btn-full primary" onclick="saveMeal()">💾 Mentés</button>
      <button class="btn-full danger" id="delete-meal-btn" onclick="openDeleteConfirm()" style="display:none">🗑️ Törlés</button>
      <button class="btn-full secondary" onclick="closeMealModal()">Mégse</button>
    </div>
  </div>
</div>

<!-- RECIPE EDIT MODAL -->
<div class="modal-overlay" id="recipe-modal" onclick="closeRecipeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="recipe-modal-title">Recept</div>
    <div class="modal-section">
      <label class="modal-label">Recept neve</label>
      <input class="modal-input" type="text" id="recipe-name-input" placeholder="pl. Paprikás krumpli">
    </div>
    <div class="modal-section" style="padding-top:4px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <label class="modal-label" style="margin:0">Hozzávalók <span style="color:var(--text3);font-size:11px">(személyek: <span id="recipe-servings-display">4</span>)</span></label>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="btn-sm" onclick="changeRecipeServings(-1)" style="width:28px;height:28px;padding:0;font-size:16px;border-radius:6px;">−</button>
          <span id="recipe-servings-val" style="font-size:14px;font-weight:600;min-width:20px;text-align:center;">4</span>
          <button class="btn-sm" onclick="changeRecipeServings(1)" style="width:28px;height:28px;padding:0;font-size:16px;border-radius:6px;">+</button>
        </div>
      </div>
      <div class="ingredient-list" id="recipe-ingredient-list"></div>
      <button class="btn-sm" onclick="addRecipeIngredientRow()" style="margin-top:8px; width:100%">+ Hozzávaló hozzáadása</button>
    </div>
    <div class="modal-actions">
      <button class="btn-full secondary" onclick="openAssignRecipeToDay()">📅 Hozzáadás naphoz</button>
      <button class="btn-full secondary" onclick="addRecipeToShopping()">🛒 Bevásárlólistához adás</button>
      <button class="btn-full primary" onclick="saveRecipe()">💾 Recept mentése</button>
      <button class="btn-full danger" id="delete-recipe-btn" onclick="deleteRecipe()" style="display:none">Recept törlése</button>
      <button class="btn-full secondary" onclick="closeRecipeModal()">Mégse</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="delete-confirm-modal" onclick="closeDeleteConfirm(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Törlés megerősítése</div>
    <div class="modal-context" id="delete-confirm-dish"></div>
    <div class="modal-section">
      <label style="display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer;">
        <input type="checkbox" id="delete-from-shopping-check" style="width:20px;height:20px;accent-color:var(--red);cursor:pointer;">
        <span style="font-size:14px;color:var(--text2);">Bevásárlólistáról is töröljön (ha szerepel rajta)</span>
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-full danger" onclick="confirmDeleteMeal()">🗑️ Igen, törlöm</button>
      <button class="btn-full secondary" onclick="closeDeleteConfirm()">Mégse</button>
    </div>
  </div>
</div>

<!-- ASSIGN RECIPE TO DAY MODAL -->
<div class="modal-overlay" id="assign-modal" onclick="closeAssignModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Naphoz adás</div>
    <div class="modal-context" id="assign-modal-recipe-name"></div>
    <div class="modal-section">
      <label class="modal-label">Nap</label>
      <select class="modal-input" id="assign-date-select"></select>
    </div>
    <div class="modal-section" style="padding-top:4px;">
      <label class="modal-label">Étkezés</label>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="meal-pick-btn" data-meal="reggeli" onclick="selectAssignMeal(this)">☕ Reggeli</button>
        <button class="meal-pick-btn" data-meal="tizórai" onclick="selectAssignMeal(this)">🍎 Tízórai</button>
        <button class="meal-pick-btn" data-meal="ebéd" onclick="selectAssignMeal(this)">🍽️ Ebéd</button>
        <button class="meal-pick-btn" data-meal="uzsonna" onclick="selectAssignMeal(this)">🧁 Uzsonna</button>
        <button class="meal-pick-btn" data-meal="vacsora" onclick="selectAssignMeal(this)">🌙 Vacsora</button>

        <button class="btn-sm" onclick="changeAssignServings(-1)" style="width:32px;height:32px;padding:0;font-size:16px;">−</button>
        <span id="assign-servings-val" style="font-size:15px;font-weight:600;min-width:24px;text-align:center;">4</span>
        <button class="btn-sm" onclick="changeAssignServings(1)" style="width:32px;height:32px;padding:0;font-size:16px;">+</button>
      </div>

      <button class="btn-full primary" onclick="confirmAssignRecipe()">📅 Hozzáadás a menühez</button>

    </div>
  </div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
const HARDCODED_API_URL = 'https://script.google.com/macros/s/AKfycbw5mW1tabc0UERYYhtJa1BlSn6wMC_gF-B_nkW-TpK157PoWqe713upAwu5KHch36s8Pg/exec';
let API_URL = HARDCODED_API_URL || localStorage.getItem('csaladiMenuApi') || '';
let DEFAULT_SERVINGS = parseInt(localStorage.getItem('csaladiMenuServings') || '4');
let weekOffset = 0; // current week offset from today
let menuData = []; // [{date, meal, dish, recipeId, servings}]
let recipes = []; // [{id, name, servings, ingredients}]
let shopping = []; // [{id, ingredient, amount, unit, checked}]

// Current modal state
let editingDate = null;
let editingMeal = null;
let editingEntryId = null;
let editingRecipeId = null;
let currentServings = DEFAULT_SERVINGS;
let currentRecipeServings = DEFAULT_SERVINGS;

const MEALS = [
  { key: 'reggeli', label: 'Reggeli', icon: '☕' },
  { key: 'tizórai', label: 'Tízórai', icon: '🍎' },
  { key: 'ebéd', label: 'Ebéd', icon: '🍽️' },
  { key: 'uzsonna', label: 'Uzsonna', icon: '🧁' },
  { key: 'vacsora', label: 'Vacsora', icon: '🌙' }
];

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  loadConfig();
  renderWeek();
  if (API_URL) {
    fetchAll();
  }
});

function loadConfig() {
  document.getElementById('api-url-input').value = API_URL;
  document.getElementById('default-servings').value = DEFAULT_SERVINGS;
  updateHeaderStatus();
}

function saveConfig() {
  API_URL = document.getElementById('api-url-input').value.trim();
  DEFAULT_SERVINGS = parseInt(document.getElementById('default-servings').value) || 4;
  currentServings = DEFAULT_SERVINGS;
  localStorage.setItem('csaladiMenuApi', API_URL);
  localStorage.setItem('csaladiMenuServings', DEFAULT_SERVINGS);
  updateHeaderStatus();
  showStatus('Beállítások mentve!', 'ok');
  if (API_URL) fetchAll();
}

async function testConnection() {
  if (!API_URL) { showStatus('Nincs URL megadva!', 'err'); return; }
  showStatus('Kapcsolódás...', '');
  try {
    const res = await api('getMenu');
    showStatus('Kapcsolat sikeres! ✓', 'ok');
  } catch (e) {
    showStatus('Hiba: ' + e.message, 'err');
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('config-status');
  el.textContent = msg;
  el.className = 'status-msg ' + type;
}

function updateHeaderStatus() {
  const el = document.getElementById('header-status');
  el.textContent = API_URL ? 'Szinkronizálva' : 'Nincs API beállítva';
  el.style.color = API_URL ? 'var(--green)' : 'var(--text3)';
}

function toggleConfig() {
  document.getElementById('config-panel').classList.toggle('open');
}

// ============================================================
// API
// ============================================================
async function api(action, params = {}) {
  if (!API_URL) throw new Error('API URL nincs beállítva!');
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Ismeretlen hiba');
  return data.data;
}

async function fetchAll() {
  try {
    [menuData, recipes, shopping] = await Promise.all([
      api('getMenu'),
      api('getRecipes'),
      api('getShopping')
    ]);
    renderWeek();
    renderShopping();
    renderRecipes();
    updateShoppingCount();
  } catch (e) {
    // silent - no API configured yet
  }
}

// ============================================================
// WEEK / MENU VIEW
// ============================================================
function getWeekDates() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const mon = new Date(today);
  mon.setDate(today.getDate() - today.getDay() + 1 + weekOffset * 7);
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function dateStr(d) {
  return d.toISOString().split('T')[0];
}

const DAY_NAMES_FULL = ['Hétfő', 'Kedd', 'Szerda', 'Csütörtök', 'Péntek', 'Szombat', 'Vasárnap'];
const MONTH_NAMES = ['január','február','március','április','május','június','július','augusztus','szeptember','október','november','december'];

function changeWeek(dir) {
  weekOffset += dir;
  renderWeek();
}

function formatDayHeader(date, idx) {
  const monthName = MONTH_NAMES[date.getMonth()];
  const day = date.getDate();
  return `${DAY_NAMES_FULL[idx]}, ${monthName} ${day}.`;
}

function renderWeek() {
  const dates = getWeekDates();
  const today = dateStr(new Date());

  const fmt = (d) => `${d.getMonth()+1}.${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('week-label').textContent =
    `${dates[0].getFullYear()} · ${fmt(dates[0])} – ${fmt(dates[6])}`;

  const container = document.getElementById('days-container');
  container.innerHTML = '';

  dates.forEach((date, idx) => {
    const ds = dateStr(date);
    const isToday = ds === today;
    const dayMenuItems = menuData.filter(m => String(m.date).substring(0,10) === ds);

    const card = document.createElement('div');
    card.className = 'day-card';
    card.dataset.date = ds;

    const header = document.createElement('div');
    header.className = 'day-header';
    header.innerHTML = `
      <span class="day-name">${formatDayHeader(date, idx)}</span>
      ${isToday ? '<span class="day-today">Ma</span>' : ''}
    `;
    card.appendChild(header);

    const mealsDiv = document.createElement('div');
    mealsDiv.className = 'day-meals';

    MEALS.forEach(({ key, label, icon }) => {
      const entries = dayMenuItems.filter(m => m.meal === key);

      const mealHeader = document.createElement('div');
      mealHeader.className = 'meal-type-header meal-slot-drop-target';
      mealHeader.dataset.date = ds;
      mealHeader.dataset.meal = key;
      mealHeader.innerHTML = `<span class="meal-icon">${icon}</span><span class="meal-label">${label}</span>`;
      mealsDiv.appendChild(mealHeader);

      entries.forEach(entry => {
        // drop zone előtte
        const dz = document.createElement('div');
        dz.className = 'drop-zone';
        dz.dataset.date = ds;
        dz.dataset.meal = key;
        mealsDiv.appendChild(dz);

        const row = document.createElement('div');
        row.className = 'meal-row meal-row-dish';
        row.draggable = true;
        row.dataset.entryId = entry.id;
        row.dataset.date = ds;
        row.dataset.meal = key;
        row.dataset.dish = entry.dish;

        const recipe = entry.recipeId ? recipes.find(r => r.id === entry.recipeId) : null;
        row.innerHTML = `
          <span class="drag-handle" title="Húzd át">⠿</span>
          <span class="meal-dish">${entry.dish}</span>
          ${recipe ? '<span class="meal-recipe-badge">R</span>' : ''}
          <span class="meal-edit-icon" style="margin-left:auto">✏️</span>
        `;
        row.querySelector('.meal-edit-icon').onclick = (e) => {
          e.stopPropagation();
          openMealModal(ds, key, entry);
        };
        row.querySelector('.drag-handle').addEventListener('mousedown', e => e.stopPropagation());
        mealsDiv.appendChild(row);
      });

      // utolsó drop zone
      const dzEnd = document.createElement('div');
      dzEnd.className = 'drop-zone';
      dzEnd.dataset.date = ds;
      dzEnd.dataset.meal = key;
      mealsDiv.appendChild(dzEnd);

      if (entries.length < 3) {
        const addRow = document.createElement('div');
        addRow.className = 'meal-row meal-row-add';
        addRow.onclick = () => openMealModal(ds, key, null);
        addRow.innerHTML = `<span class="meal-add-icon">+</span><span class="meal-empty">étel hozzáadása</span>`;
        mealsDiv.appendChild(addRow);
      }
    });

    card.appendChild(mealsDiv);
    container.appendChild(card);
  });

  initDragDrop();
}

// ============================================================
// MEAL MODAL
// ============================================================
function openMealModal(date, meal, existing) {
  editingDate = date;
  editingMeal = meal;
  editingEntryId = existing?.id || null;
  const mealInfo = MEALS.find(m => m.key === meal);
  const d = new Date(date + 'T12:00:00');
  const dayIdx = d.getDay() === 0 ? 6 : d.getDay() - 1;

  document.getElementById('meal-modal-title').textContent =
    mealInfo.icon + ' ' + mealInfo.label;
  document.getElementById('meal-modal-context').textContent =
    formatDayHeader(d, dayIdx);

  document.getElementById('meal-dish-input').value = existing?.dish || '';
  currentServings = existing?.servings || DEFAULT_SERVINGS;
  document.getElementById('servings-val').textContent = currentServings;
  document.getElementById('servings-display').textContent = currentServings;

  const chipsContainer = document.getElementById('recipe-chips');
  chipsContainer.innerHTML = '';
  if (recipes.length === 0) {
    chipsContainer.innerHTML = '<span style="color:var(--text3);font-size:13px">Még nincs mentett recept</span>';
  } else {
    recipes.forEach(r => {
      const chip = document.createElement('div');
      chip.className = 'recipe-chip' + (existing?.recipeId === r.id ? ' selected' : '');
      chip.textContent = r.name;
      chip.onclick = () => selectRecipeChip(r.id, r.name, chip);
      chipsContainer.appendChild(chip);
    });
  }

  editingRecipeId = existing?.recipeId || null;
  const recipe = editingRecipeId ? recipes.find(r => r.id === editingRecipeId) : null;
  renderIngredientList('ingredient-list', recipe?.ingredients || [], currentServings, recipe?.servings || DEFAULT_SERVINGS);

  document.getElementById('add-to-shopping-check').checked = false;
  document.getElementById('delete-meal-btn').style.display = existing ? 'block' : 'none';
  document.getElementById('meal-modal').classList.add('open');
}

function selectRecipeChip(recipeId, recipeName, chipEl) {
  document.querySelectorAll('.recipe-chip').forEach(c => c.classList.remove('selected'));
  if (editingRecipeId === recipeId) {
    editingRecipeId = null;
    renderIngredientList('ingredient-list', [], currentServings, DEFAULT_SERVINGS);
    return;
  }
  chipEl.classList.add('selected');
  editingRecipeId = recipeId;
  document.getElementById('meal-dish-input').value = recipeName;
  const recipe = recipes.find(r => r.id === recipeId);
  if (recipe) {
    currentServings = recipe.servings;
    document.getElementById('servings-val').textContent = currentServings;
    document.getElementById('servings-display').textContent = currentServings;
    renderIngredientList('ingredient-list', recipe.ingredients, currentServings, recipe.servings);
  }
}

function closeMealModal(e) {
  if (e && e.target !== document.getElementById('meal-modal')) return;
  document.getElementById('meal-modal').classList.remove('open');
}

function changeServings(delta) {
  currentServings = Math.max(1, currentServings + delta);
  document.getElementById('servings-val').textContent = currentServings;
  document.getElementById('servings-display').textContent = currentServings;
  if (editingRecipeId) {
    const recipe = recipes.find(r => r.id === editingRecipeId);
    if (recipe) renderIngredientList('ingredient-list', recipe.ingredients, currentServings, recipe.servings);
  }
}

function renderIngredientList(containerId, ingredients, forServings, baseServings) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  ingredients.forEach((ing, i) => {
    addIngredientRow(containerId, ing, forServings, baseServings);
  });
}

function getKnownUnits() {
  const units = new Set();
  recipes.forEach(r => r.ingredients.forEach(i => { if (i.unit) units.add(i.unit); }));
  const defaults = ['g','dkg','kg','ml','dl','l','db','ek','tk','csésze','csipet','csomag','szelet'];
  defaults.forEach(u => units.add(u));
  return [...units];
}

function addIngredientRow(containerId = 'ingredient-list', ing = null, forServings = null, baseServings = null) {
  const container = document.getElementById(containerId);
  const row = document.createElement('div');
  row.className = 'ingredient-row';

  const scale = (forServings && baseServings && baseServings > 0) ? forServings / baseServings : 1;
  const scaledAmt = ing?.amount ? Math.round(parseFloat(ing.amount) * scale * 100) / 100 : '';
  const listId = 'units-list-' + containerId;

  if (!document.getElementById(listId)) {
    const dl = document.createElement('datalist');
    dl.id = listId;
    getKnownUnits().forEach(u => {
      const opt = document.createElement('option');
      opt.value = u;
      dl.appendChild(opt);
    });
    document.body.appendChild(dl);
  }

  row.innerHTML = `
    <input class="ing-name" type="text" placeholder="Hozzávaló" value="${ing?.name || ''}">
    <input class="ing-amount" type="number" placeholder="Mennyi" value="${scaledAmt || ing?.amount || ''}">
    <input class="ing-unit" type="text" placeholder="egység" value="${ing?.unit || ''}" list="${listId}">
    <button class="del-btn" onclick="this.parentElement.remove()">×</button>
  `;
  container.appendChild(row);
}

function getIngredients(containerId) {
  const rows = document.querySelectorAll('#' + containerId + ' .ingredient-row');
  return Array.from(rows).map(r => ({
    name: r.querySelector('.ing-name').value.trim(),
    amount: r.querySelector('.ing-amount').value.trim(),
    unit: r.querySelector('.ing-unit').value.trim()
  })).filter(i => i.name);
}

async function saveMeal() {
  const dish = document.getElementById('meal-dish-input').value.trim();
  if (!dish) { toast('Add meg az étel nevét!'); return; }

  const ings = getIngredients('ingredient-list');
  const addToShopping = document.getElementById('add-to-shopping-check').checked;

  try {
    const result = await api('setMeal', {
      date: editingDate,
      meal: editingMeal,
      dish,
      recipeId: editingRecipeId || '',
      servings: currentServings,
      entryId: editingEntryId || ''
    });

    if (ings.length > 0 && !editingRecipeId) {
      const recResult = await api('saveRecipe', {
        name: dish,
        servings: currentServings,
        ingredients: JSON.stringify(ings.map(i => ({ name: i.name, amount: i.amount, unit: i.unit })))
      });
      await api('setMeal', {
        date: editingDate, meal: editingMeal, dish,
        recipeId: recResult.id, servings: currentServings,
        entryId: result.entryId || editingEntryId || ''
      });
    }

    if (addToShopping && ings.length > 0) {
      await api('addShoppingItems', {
        items: JSON.stringify(ings.map(i => ({ ingredient: i.name, amount: i.amount, unit: i.unit })))
      });
    }

    await fetchAll();
    document.getElementById('meal-modal').classList.remove('open');
    toast(addToShopping && ings.length > 0 ? 'Mentve + bevásárlólistához adva! ✓' : 'Mentve! ✓');
  } catch(e) {
    toast('Hiba: ' + e.message);
  }
}

async function deleteMeal() {
  if (!editingEntryId) { toast('Nincs mit törölni'); return; }
  try {
    await api('deleteMeal', { entryId: editingEntryId });
    await fetchAll();
    document.getElementById('meal-modal').classList.remove('open');
    toast('Törölve');
  } catch(e) { toast('Hiba: ' + e.message); }
}

// ============================================================
// DELETE CONFIRM
// ============================================================
let deletingEntry = null;

function openDeleteConfirm() {
  deletingEntry = {
    id: editingEntryId,
    dish: document.getElementById('meal-dish-input').value,
    date: editingDate,
    meal: editingMeal
  };
  document.getElementById('delete-confirm-dish').textContent = `"${deletingEntry.dish}"`;
  document.getElementById('delete-from-shopping-check').checked = false;
  document.getElementById('meal-modal').classList.remove('open');
  document.getElementById('delete-confirm-modal').classList.add('open');
}

function closeDeleteConfirm(e) {
  if (e && e.target !== document.getElementById('delete-confirm-modal')) return;
  document.getElementById('delete-confirm-modal').classList.remove('open');
}

async function confirmDeleteMeal() {
  if (!deletingEntry?.id && !deletingEntry?.date) return;
  const alsoShopping = document.getElementById('delete-from-shopping-check').checked;
  try {
    await api('deleteMeal', {
      entryId: deletingEntry.id || '',
      date: deletingEntry.date || '',
      meal: deletingEntry.meal || ''
    });

    if (alsoShopping) {
      // Megkeressük a bevásárlólistán az étel hozzávalóit név alapján
      // és töröljük a ki nem pipált elemeket
      const entry = menuData.find(m => m.id === deletingEntry.id);
      if (entry?.recipeId) {
        const recipe = recipes.find(r => r.id === entry.recipeId);
        if (recipe) {
          const ingNames = recipe.ingredients.map(i => i.name.toLowerCase());
          const toDelete = shopping.filter(s =>
            !s.checked && ingNames.includes(s.ingredient.toLowerCase())
          );
          for (const s of toDelete) {
            await api('toggleShoppingItem', { id: s.id });
            await api('clearChecked');
          }
        }
      }
    }

    await fetchAll();
    document.getElementById('delete-confirm-modal').classList.remove('open');
    toast(alsoShopping ? 'Törölve + bevásárlólistáról is! ✓' : 'Törölve ✓');
  } catch(e) { toast('Hiba: ' + e.message); }
}

// ============================================================
// DRAG & DROP (desktop + touch)
// ============================================================
let dragEntryId = null;
let dragSourceDate = null;
let dragSourceMeal = null;

function initDragDrop() {
  // Desktop drag events
  document.querySelectorAll('.meal-row-dish[draggable]').forEach(row => {
    row.addEventListener('dragstart', e => {
      dragEntryId = row.dataset.entryId;
      dragSourceDate = row.dataset.date;
      dragSourceMeal = row.dataset.meal;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
    });
  });

  document.querySelectorAll('.drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
      zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      dropEntry(zone.dataset.date, zone.dataset.meal);
    });
  });

  // Touch drag events
  let touchDragEl = null;
  let ghost = null;

  document.querySelectorAll('.drag-handle').forEach(handle => {
    handle.addEventListener('touchstart', e => {
      const row = handle.closest('.meal-row-dish');
      dragEntryId = row.dataset.entryId;
      dragSourceDate = row.dataset.date;
      dragSourceMeal = row.dataset.meal;
      touchDragEl = row;

      ghost = row.cloneNode(true);
      ghost.style.cssText = `position:fixed;opacity:0.8;pointer-events:none;z-index:999;
        width:${row.offsetWidth}px;background:var(--surface);border-radius:8px;
        border:1px solid var(--accent);padding:6px 10px;font-size:14px;`;
      document.body.appendChild(ghost);
      row.classList.add('dragging');
      e.preventDefault();
    }, { passive: false });

    handle.addEventListener('touchmove', e => {
      if (!ghost) return;
      const t = e.touches[0];
      ghost.style.left = (t.clientX - 40) + 'px';
      ghost.style.top = (t.clientY - 20) + 'px';

      ghost.style.display = 'none';
      const el = document.elementFromPoint(t.clientX, t.clientY);
      ghost.style.display = '';

      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
      const zone = el?.closest('.drop-zone') || el?.classList.contains('drop-zone') && el;
      if (zone) zone.classList.add('drag-over');

      e.preventDefault();
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      if (!ghost) return;
      ghost.remove(); ghost = null;
      if (touchDragEl) touchDragEl.classList.remove('dragging');

      const t = e.changedTouches[0];
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const zone = el?.closest?.('.drop-zone');
      if (zone) dropEntry(zone.dataset.date, zone.dataset.meal);

      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
      touchDragEl = null;
    });
  });
}

async function dropEntry(targetDate, targetMeal) {
  if (!dragEntryId) return;
  if (dragSourceDate === targetDate && dragSourceMeal === targetMeal) return;

  const entry = menuData.find(m => m.id === dragEntryId);
  if (!entry) return;

  // Ellenőrzés: max 3 étel per étkezés
  const targetCount = menuData.filter(m =>
    String(m.date).substring(0,10) === targetDate && m.meal === targetMeal
  ).length;
  if (targetCount >= 3) { toast('Max. 3 étel per étkezés!'); return; }

  try {
    await api('setMeal', {
      date: targetDate,
      meal: targetMeal,
      dish: entry.dish,
      recipeId: entry.recipeId || '',
      servings: entry.servings,
      entryId: dragEntryId
    });
    await fetchAll();
    toast(`Áthelyezve ✓`);
  } catch(e) { toast('Hiba: ' + e.message); }

  dragEntryId = null;
}

async function addMealToShopping() {
  const ings = getIngredients('ingredient-list');
  if (ings.length === 0) { toast('Nincs hozzávaló a listán'); return; }
  try {
    await api('addShoppingItems', {
      items: JSON.stringify(ings.map(i => ({ ingredient: i.name, amount: i.amount, unit: i.unit })))
    });
    await fetchAll();
    toast('Hozzáadva a bevásárlólistához! 🛒');
  } catch(e) { toast('Hiba: ' + e.message); }
}

function openNosalty(recipeName) {
  const dish = recipeName || document.getElementById('meal-dish-input').value.trim();
  if (!dish) { toast('Add meg az étel nevét először!'); return; }
  const url = `https://www.mindmegette.hu/kereses/?q=${encodeURIComponent(dish)}`;
  window.open(url, '_blank');
}

// ============================================================
// SHOPPING VIEW
// ============================================================
function renderShopping() {
  const container = document.getElementById('shopping-container');
  const unchecked = shopping.filter(i => !i.checked);
  const checked = shopping.filter(i => i.checked);

  if (shopping.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🛒</div>
        <p>A bevásárlólista üres.<br>Adj hozzá ételt a menüből,<br>vagy vegyél fel terméket kézzel.</p>
      </div>`;
    return;
  }

  container.innerHTML = '';

  if (unchecked.length > 0) {
    const t = document.createElement('div');
    t.className = 'shop-section-title';
    t.textContent = 'Megvásárlandó';
    container.appendChild(t);
    unchecked.forEach(item => container.appendChild(createShopItem(item)));
  }

  if (checked.length > 0) {
    const t = document.createElement('div');
    t.className = 'shop-section-title';
    t.textContent = 'Megvásárolva';
    container.appendChild(t);
    checked.forEach(item => container.appendChild(createShopItem(item)));
  }
}

function createShopItem(item) {
  const el = document.createElement('div');
  el.className = 'shop-item' + (item.checked ? ' checked' : '');
  el.onclick = () => toggleShopItem(item.id);
  const amtStr = [item.amount, item.unit].filter(Boolean).join(' ');
  el.innerHTML = `
    <div class="shop-checkbox">${item.checked ? '✓' : ''}</div>
    <span class="shop-name">${item.ingredient}</span>
    ${amtStr ? `<span class="shop-amount">${amtStr}</span>` : ''}
  `;
  return el;
}

async function toggleShopItem(id) {
  try {
    await api('toggleShoppingItem', { id });
    const item = shopping.find(i => i.id === id);
    if (item) item.checked = !item.checked;
    renderShopping();
    updateShoppingCount();
  } catch(e) { toast('Hiba: ' + e.message); }
}

async function clearChecked() {
  if (!shopping.some(i => i.checked)) { toast('Nincs kész elem'); return; }
  try {
    await api('clearChecked');
    shopping = shopping.filter(i => !i.checked);
    renderShopping();
    updateShoppingCount();
    toast('Kész elemek törölve');
  } catch(e) { toast('Hiba: ' + e.message); }
}

async function clearAll() {
  if (!confirm('Biztosan törlöd az egész bevásárlólistát?')) return;
  try {
    await api('clearAll');
    shopping = [];
    renderShopping();
    updateShoppingCount();
    toast('Lista törölve');
  } catch(e) { toast('Hiba: ' + e.message); }
}

function updateShoppingCount() {
  const unchecked = shopping.filter(i => !i.checked).length;
  const badge = document.getElementById('shopping-count');
  if (unchecked > 0) {
    badge.textContent = unchecked;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

// ============================================================
// RECIPES VIEW
// ============================================================
function renderRecipes() {
  const container = document.getElementById('recipes-container');
  if (recipes.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="emoji">📖</div>
        <p>Még nincs mentett recept.<br>Az ételfelvitelnél automatikusan<br>mentjük a hozzávalókat.</p>
      </div>`;
    return;
  }
  container.innerHTML = '';
  recipes.forEach(r => {
    const card = document.createElement('div');
    card.className = 'recipe-card';
    const ingPreview = r.ingredients.slice(0, 4).map(i => i.name).join(', ') + (r.ingredients.length > 4 ? '...' : '');
    card.innerHTML = `
      <div class="recipe-card-name">${r.name}</div>
      <div class="recipe-card-meta">${r.servings} személyre · ${r.ingredients.length} hozzávaló</div>
      ${ingPreview ? `<div class="recipe-card-ings">${ingPreview}</div>` : ''}
      <div style="margin-top:10px;display:flex;gap:8px;">
        <button class="btn-sm" onclick="event.stopPropagation();openRecipeModal(recipes.find(x=>x.id==='${r.id}'))" style="flex:1">✏️ Szerkesztés</button>
        <button class="btn-sm nosalty" onclick="event.stopPropagation();openNosalty('${r.name.replace(/'/g,"\\'")}')">🔍 Mindmegette</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function openNewRecipe() {
  openRecipeModal(null);
}

function openRecipeModal(recipe) {
  editingRecipeId = recipe?.id || null;
  document.getElementById('recipe-modal-title').textContent = recipe ? 'Recept szerkesztése' : 'Új recept';
  document.getElementById('recipe-name-input').value = recipe?.name || '';
  currentRecipeServings = recipe?.servings || DEFAULT_SERVINGS;
  document.getElementById('recipe-servings-val').textContent = currentRecipeServings;
  document.getElementById('recipe-servings-display').textContent = currentRecipeServings;
  renderIngredientList('recipe-ingredient-list', recipe?.ingredients || [], currentRecipeServings, recipe?.servings || DEFAULT_SERVINGS);
  document.getElementById('delete-recipe-btn').style.display = recipe ? 'block' : 'none';
  document.getElementById('recipe-modal').classList.add('open');
}

function closeRecipeModal(e) {
  if (e && e.target !== document.getElementById('recipe-modal')) return;
  document.getElementById('recipe-modal').classList.remove('open');
}

function changeRecipeServings(delta) {
  currentRecipeServings = Math.max(1, currentRecipeServings + delta);
  document.getElementById('recipe-servings-val').textContent = currentRecipeServings;
  document.getElementById('recipe-servings-display').textContent = currentRecipeServings;
}

function addRecipeIngredientRow() {
  addIngredientRow('recipe-ingredient-list');
}

async function saveRecipe() {
  const name = document.getElementById('recipe-name-input').value.trim();
  if (!name) { toast('Add meg a recept nevét!'); return; }
  const ings = getIngredients('recipe-ingredient-list');
  try {
    await api('saveRecipe', {
      id: editingRecipeId || '',
      name,
      servings: currentRecipeServings,
      ingredients: JSON.stringify(ings)
    });
    await fetchAll();
    document.getElementById('recipe-modal').classList.remove('open');
    toast('Recept mentve! ✓');
  } catch(e) { toast('Hiba: ' + e.message); }
}

async function deleteRecipe() {
  if (!confirm('Biztosan törlöd ezt a receptet?')) return;
  try {
    await api('deleteRecipe', { id: editingRecipeId });
    await fetchAll();
    document.getElementById('recipe-modal').classList.remove('open');
    toast('Recept törölve');
  } catch(e) { toast('Hiba: ' + e.message); }
}

// ============================================================
// ASSIGN RECIPE TO DAY
// ============================================================
let assignRecipeId = null;
let assignServings = 4;
let assignMeal = 'ebéd';

function openAssignRecipeToDay() {
  assignRecipeId = editingRecipeId;
  if (!assignRecipeId) { toast('Mentsd el a receptet először!'); return; }
  const recipe = recipes.find(r => r.id === assignRecipeId);
  if (!recipe) return;

  assignServings = recipe.servings || DEFAULT_SERVINGS;
  assignMeal = 'ebéd';

  document.getElementById('assign-modal-recipe-name').textContent = recipe.name;
  document.getElementById('assign-servings-val').textContent = assignServings;

  // Kitöltjük a dátum selectet: ma + 13 nap
  const sel = document.getElementById('assign-date-select');
  sel.innerHTML = '';
  const today = new Date();
  today.setHours(0,0,0,0);
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const ds = dateStr(d);
    const label = i === 0 ? 'Ma' : i === 1 ? 'Holnap' : `${DAY_NAMES_FULL[d.getDay() === 0 ? 6 : d.getDay()-1]}, ${d.getMonth()+1}.${String(d.getDate()).padStart(2,'0')}`;
    const opt = document.createElement('option');
    opt.value = ds;
    opt.textContent = label;
    sel.appendChild(opt);
  }

  document.querySelectorAll('.meal-pick-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.meal === assignMeal);
  });

  document.getElementById('recipe-modal').classList.remove('open');
  document.getElementById('assign-modal').classList.add('open');
}

function selectAssignMeal(btn) {
  assignMeal = btn.dataset.meal;
  document.querySelectorAll('.meal-pick-btn').forEach(b => b.classList.toggle('selected', b === btn));
}

function changeAssignServings(delta) {
  assignServings = Math.max(1, assignServings + delta);
  document.getElementById('assign-servings-val').textContent = assignServings;
}

function closeAssignModal(e) {
  if (e && e.target !== document.getElementById('assign-modal')) return;
  document.getElementById('assign-modal').classList.remove('open');
}

async function confirmAssignRecipe() {
  const date = document.getElementById('assign-date-select').value;
  const recipe = recipes.find(r => r.id === assignRecipeId);
  if (!recipe || !date || !assignMeal) return;
  try {
    await api('setMeal', {
      date, meal: assignMeal, dish: recipe.name,
      recipeId: assignRecipeId, servings: assignServings
    });
    await fetchAll();
    document.getElementById('assign-modal').classList.remove('open');
    toast(`${recipe.name} hozzáadva a menühöz! ✓`);
  } catch(e) { toast('Hiba: ' + e.message); }
}

async function addRecipeToShopping() {
  const recipe = recipes.find(r => r.id === editingRecipeId);
  if (!recipe || recipe.ingredients.length === 0) { toast('Nincs hozzávaló a receptben'); return; }
  try {
    await api('addShoppingItems', {
      items: JSON.stringify(recipe.ingredients.map(i => ({ ingredient: i.name, amount: i.amount, unit: i.unit })))
    });
    await fetchAll();
    toast('Hozzávalók a bevásárlólistán! 🛒');
  } catch(e) { toast('Hiba: ' + e.message); }
}


function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['menu','shopping','recipes'][i] === tab);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
